# Merge the move_clutter datasets, convert to gripper_floor_384, label contact
# actions, and produce naavox/move_clutter_combined_384_2.
output_repo_id: naavox/move_clutter_combined_384_2
camera_mode: gripper_floor_384
center_crop: false

merge:
  - naavox/move_clutter
  - naavox/move_clutter_2
  - naavox/move_clutter_hawes_1
  - naavox/move_clutter_chuck_1
  - naavox/move_clutter_79west4

label_contact_actions:
  enabled: true
  pressure_threshold: 0.1
  episode_end_seconds: 1.0
  blend_seconds: 0.5
  rotate_contact_vec: false
