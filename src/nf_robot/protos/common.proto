syntax = "proto3";

package nf.common;

// When representing robot world space, Z is up
message Vec3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message Pose {
  Vec3 rotation = 1; // Rodriguez rotation vector
  Vec3 position = 2;
}

// Episode control commands

enum EpCommand {
  EPCOMMAND_NOTHING = 0;
  EPCOMMAND_ABANDON = 1;
  EPCOMMAND_END_RECORDING = 2;
  EPCOMMAND_START_OR_COMPLETE = 3; // DEPRECATED. send EVAL_START or EVAL_STOP for both recording or eval
  EPCOMMAND_EVAL_START = 4;
  EPCOMMAND_EVAL_STOP = 5;
}

enum LerobotStatus {
  EPISODESTATUS_NA = 0;
  EPISODESTATUS_RECORDING = 1; // recording an episide
  EPISODESTATUS_REC_PROCESSING = 2; // Finishing up the encoding of the last recorded episode, or finaizing dataset for upload.
  EPISODESTATUS_REC_READY = 3; // Idle and ready to start recording an episode.
  EPISODESTATUS_REC_ALL_COMPLETE = 4; // Recording session finished and data uploaded. Expected after sending EPCOMMAND_END_RECORDING
  EPISODESTATUS_EVAL_IDLE = 5; // Idle and ready to start inference
  EPISODESTATUS_EVAL_ACTIVE = 6; // Actively doing inference and sending control inputs.
  EPISODESTATUS_ERROR = 7; // Lerobot process has failed with some kind of error.
}

message LerobotSessionStatus {
  // Uniquely identify the process running the lerobot session.
  optional string process_id = 1;

  // Used to report the current mode of the session
  optional LerobotStatus status = 2;

  // Report the current episode number this session (being recorded, processed, or just completed)
  optional uint32 session_ep_number = 3;

  // The repo id where data will be uploaded to huggingface. reported at the beginning of a recording session,
  optional string dataset_repo_id = 4;

  // The total number of episodes in the datset. reported at the beginning of a recording session.
  optional uint32 dataset_ep_count = 5;

  // The repo id or local path of the policy being used for evaluation. reported at the beginning of an eval session
  optional string policy_repo_id = 6;

  // Error from the lerobot process
  optional string error = 7;
}

// Both control panel and lerobot sessions act as UIs connected to a single robot.
// The control panel issues EpisodeControl messages, the robot forwards them back to all connected UIs in case one is lerobot.
message EpisodeControl {
  // When the lerobot session receives one of these commands, it acts on it.
  EpCommand command = 1;

  // The lerobot sessions sends EpisodeControl messages contianing this field. they are forwarded to all UIs
  // When the web UI recives one, it uses it to update the interface.
  optional LerobotSessionStatus status = 2;
}

enum AnchorType {
  // the type of anchor is not yet known
  ANCHORTYPE_UNSPECIFIED = 0;
  // four anchors each controlling one line
  ANCHORTYPE_PILOT = 1;
  // two anchors each controlling two lines
  ANCHORTYPE_ARPEGGIO = 2;
}