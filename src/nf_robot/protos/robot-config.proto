syntax = "proto3";

package nf.config;

import "common.proto";

// Settings specific to extra indirect line on arpeggio anchor
message IndirectLine {
  // Room position of the ceramic eyelet on the indirect line
  common.Vec3 eyelet_pos = 1;

  // DEPRECATED.
  // spool index of the indirect line
  uint32 spool_index = 2;

  // Camera tilt from horizontal.
  // Several camera tilt adapters can be printed. This indicated which one is installed in the given anchor.
  // Tilt from horizontal in degrees. 22, 26, and 30 are available.
  float cam_tilt = 3;
}

// Configuration of an Anchor
message Anchor {
  // Index of the anchor in the system (0 to 4).
  uint32 num = 1;
  
  // 123.cranebot-anchor-service.2ccf67bc3fc4
  optional string service_name = 2;
  
  // Pose composed of rvec and tvec (standard OpenCV format)
  common.Pose pose = 3;
  
  // IP address where last seen
  optional string address = 4;
  uint32 port = 5;

  // arpeggio anchor details
  optional IndirectLine indirect_line= 6;
}

message Gripper {
  // service name also indicates which type it is, such as pilot gripper or arp.
  optional string service_name = 1;
  optional string address = 2;
  uint32 port = 3;
  
  // Rotation in radians
  double frame_room_spin = 4;
}

message Resolution {
  uint32 width = 1;
  uint32 height = 2;
}

message CameraCalibration {
  Resolution resolution = 1;
  
  // Flattened 3x3 matrix (row-major)
  // [fx, 0, cx, 0, fy, cy, 0, 0, 1]
  repeated double intrinsic_matrix = 2;
  
  // 1x5 distortion coefficients
  // [k1, k2, p1, p2, k3]
  repeated double distortion_coeff = 3;
}

// Data specific to this robot used during self park and unpark
message ParkData {
  // The position of the marker box at an ideal position over the parking saddle
  // for the pilot gripper, assumes that the winch line is reeled in to 10cm.
  common.Vec3 pos = 1;

  // pose of parking marker relative to room-stabilized gripper camera while resting on parking hook
  common.Pose marker_resting = 2;

  // pose of parking marker relative to room-stabilized gripper camera while hanging 10cm over parking hook
  common.Pose marker_over = 3;
}

// Message representing the configuration read and written by observer
// Not necessarily pilot hardware, but the name is frozen now
message StringmanPilotConfig {
  repeated Anchor anchors = 1;
  
  // The camera calibration values for a raspberry pi camera module 3 standard
  CameraCalibration camera_cal = 2;
  // values for a raspberry pi camera module 3 wide
  CameraCalibration camera_cal_wide = 10;
  
  // Max acceleration of anchor line in meters per second squarted
  double max_accel = 3;

  // record line length every nth iteration of the main anchor loop
  int32 rec_mod = 4; // DEPRECATED

  // running delay of main anchor loop in seconds.
  double running_ws_delay = 5;
  
  Gripper gripper = 6;
  
  // List of anchor nums of preferred anchor cameras.
  repeated int32 preferred_cameras = 7;
  
  string robot_id = 8;

  // DEPRECATED. Use calibrated_status instead.
  bool has_been_calibrated = 9;

  ParkData park_data = 11;

  // once the anchor type is known, the config must become locked to that type.
  common.AnchorType anchor_type = 12;

  // constant offset in seconds at which swing should be estimated
  // seems to depend on the machine you run the motion controller on.
  float swing_latency = 13;

  // Maximum allowed tension in newtons on any line before safety backoff occurs.
  float max_safe_tension = 14;

  // Last known room position of each named object/location, keyed by tag name (e.g. 'hamper', 'parking_location').
  // Updated as an exponential moving average whenever the tag is observed.
  map<string, common.Vec3> named_positions = 15;

  // Last known room position of the gantry, saved on clean shutdown so it can be restored on the next boot.
  common.Vec3 last_gantry_pos = 16;

  // Repo id or local path of the policy last used for a local lerobot eval session.
  string last_lerobot_policy = 17;

  // Last task description (prompt) used in a lerobot episode.
  string last_lerobot_prompt = 18;

  // Last source and destination used for automatic pick and place routing.
  common.RoutePoint last_route_source = 19;
  common.RoutePoint last_route_destination = 20;

  // Tunable constants used by pick_and_place_loop.
  PickAndPlaceConstants pick_and_place = 21;

  // Repo id last used for a local lerobot recording session.
  string last_lerobot_dataset_repo_id = 22;

  // How thoroughly this robot has been calibrated. Replaces has_been_calibrated.
  common.CalibratedStatus calibrated_status = 23;
}

// Tunable constants used by AsyncObserver.pick_and_place_loop
message PickAndPlaceConstants {
  // Gantry height offset held while approaching a target to pick up.
  common.Vec3 gantry_height_over_target = 1;

  // Gantry height offset held while flying to and dropping off at the destination.
  common.Vec3 gantry_height_over_dropoff = 2;

  // Finger angle the gripper opens to when dropping off, open enough that fingers leave the camera frame.
  float relaxed_open = 3;

  // Delay after dropping off, long enough that the payload is no longer visible in the gripper camera.
  float delay_after_drop = 4;

  // Delay between iterations of the pick and place loop.
  float loop_delay = 5;

  // If no target has been seen for this many seconds, the loop ends.
  float end_loop_timeout = 6;
}