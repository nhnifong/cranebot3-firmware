/*
Description of the wire format used to remotelty manage a stringman robot from a UI or web tool
*/

syntax = "proto3";

package nf.control;

import "common.proto";

enum Command {
  // value zero is unavailable for use
  COMMAND_UNUSED = 0;

  // Perform fast calibration (takes about 2 seconds)
  COMMAND_HALF_CAL = 1;
  // Perform full calibration sequence. (requires setup of cards on the floor)
  COMMAND_FULL_CAL = 2;
  // Zero the winch line in the gripper by reeling it in until it hits the limit switch
  COMMAND_ZERO_WINCH = 3;
  // Stop all spool motion (while respecting deceleration limits)
  COMMAND_STOP_ALL = 4;
  // Begin accepting connections from lerobot teleoperation or data collection tools
  COMMAND_ENABLE_LEROBOT = 5;
  // Begin performing automated pick and drop of targets in queue
  COMMAND_PICK_AND_DROP = 9;
  // Record the robot location as being above the parking saddle.
  COMMAND_RECORD_PARK = 15;
  // Auto park on the saddle
  COMMAND_PARK = 10;
  // Unpark from the saddle and move clear of it.
  COMMAND_UNPARK = 11;
  // Execute an automated grasp at the current position.
  COMMAND_GRASP = 12;
  // Take the current set of targets as complete and correct and add entries to dataset
  COMMAND_SUBMIT_TARGETS_TO_DATASET = 13;
  // Reel every line until tight (by switch)
  COMMAND_TIGHTEN_LINES = 16;
  // Disable motor torque on arpeggio anchors (pauses tracking loop and disables motors)
  COMMAND_DISABLE_TORQUE = 17;
  // Re-enable motor torque on arpeggio anchors
  COMMAND_ENABLE_TORQUE = 18;

  // =====  Commands intended only for diagnostics =====

  // A horizontal move paralell to the floor that measures the quality of calibration
  COMMAND_HORIZONTAL_CHECK = 6;
  // Begin saving images of the gripper camera at regular intervals in a local directory
  COMMAND_COLLECT_GRIPPER_IMAGES = 7;
  // Shuts down the observer process. robot components remain on.
  COMMAND_SHUTDOWN = 8;
  // Run a firmware update on every connected component.
  COMMAND_UPDATE_FIRMWARE = 14;
}

// Start one of several common tasks which take no arguments.
message CommonCommand {
  Command name = 1;
}

// Used for direct control of a single spool during installation or maintenence
// not for typical robot movement
message JogSpool {
  bool is_gripper = 1;
  uint32 anchor_num = 2; // only set for anchors. Interpreted as line number in systems with arpeggio anchors.
  oneof var {
    float speed = 3; // lengthen the line by this many meters per second until told to stop
    float offset = 4; // change the length of unspooled line by this many meters at a fixed and safe speed.
  }
}

// Set the given goal position for the gantry, it will begin moving there.
// DEPRECATED, use MoveGripperTo
message GantryGoalPos {
  nf.common.Vec3 pos = 1;
}

// A movement command typically sent from a gamepad or policy
message CombinedMove {
  // Direction in which to move gantry
  // When unset, gantry continues moving according to it's last command
  // when unset, speed is ignored
  optional nf.common.Vec3 direction = 1;
  
  // Speed to move gantry
  // if speed is set, direction is normalized to a unit vector and multiplied by speed.
  // if speed is unset, direction is assumed to be a velocity vector
  optional float speed = 2; // meters per second

  // Set the winch line speed
  // Line lengthening speed in meters per second
  // when unset, winch spool continues at previously commanded speed.
  // not used in arp
  optional float winch = 4;

  // Set the wrist speed in degrees of rotation per second
  optional float wrist_speed = 6;

  // Set the finger closing speed in degrees of rotation per second.
  optional float finger_speed = 7;

  // indicates that the lateral component of direction is in the gripper image's frame of reference
  // And must be rotated into the room frame of reference using the observer's last known gripper orientaiton
  // Certain ACT models are trained on this type of input.
  optional bool direction_is_in_gripper_frame = 8;

  ///// deprecated fields /////

  // DEPRECATED AND IGNORED use finger_speed
  // Set the finger servo angle
  // Range [-90,90]
  // When unset, finger command will not be issued, finger continues tracking previously commanded angle.
  optional float finger = 3;

  // DEPRECATED AND IGNORED use wrist_speed
  // Set the wrist angle in degrees
  // when unset, wrist command will not be issued, wrist continues holding previously commanded angle
  // Not used in pilot
  optional float wrist = 5;
}

// message used to tweak calibration by scaling all the anchor positions towards or away from the origin
message ScaleRoom {
  float scale = 1;
  float tiltcams = 2;
}

// Add a new target by projecting the provided point from the given camera
// and adds the current image and point to a dataset
message AddTargetFromAnchorCam {
  uint32 anchor_num = 1;

  float img_norm_x = 2;
  float img_norm_y = 3;

  // If an id is set, this is interpreted as a move command, to set a new position for the given item.
  optional string target_id = 4;
}

message DeleteTarget {
  string target_id = 1;
}

message Debug {
  // For triggering experimental undocumented behaviors without protobuf updates
  string action = 1;
}

message SetSwingCancellation {
  bool enabled = 1;
  string present = 2; // something must be present other than a boolean with a false value for the message to even exist.
}

// A command which can be sent to a single component, usually for setup or diagnostics
enum ComponentAction {
  // value zero is unavailable for use
  COMPONENT_ACTION_UNUSED = 0;

  // Reboot component
  COMPONENT_ACTION_REBOOT = 1;
  // Identify component by moving some motor or making some sound. it is up to the component exactly what happens
  COMPONENT_ACTION_IDENTIFY = 2;
  // Reel the line in until it is tight
  COMPONENT_ACTION_TIGHTEN = 3;
  // Un-Reel the line until it is slack (the user can tug on it as long as they would like more line to come out)
  COMPONENT_ACTION_RELAX = 4;
}

message SingleComponentAction {
  bool is_gripper = 1;
  optional uint32 anchor_num = 2;
  ComponentAction action = 3;
  // reseved for future use
  optional uint32 spool_num = 4;
}

enum LerobotSessionAction {
  LEROBOTSESSIONACTION_UNUSED = 0;
  LEROBOTSESSIONACTION_START_RECORD = 1;
  LEROBOTSESSIONACTION_START_EVAL = 2;
}

message ManageLerobotSession {
  LerobotSessionAction action = 1;

  // if action is record, repo_id should be a dataset repo
  // if action is eval, repo_id shoud be a policy/model repo
  string repo_id = 2;

  // Whether to supress upload to huggingface when recording is finished.
  bool suppress_upload = 3;
}

// Send the gripper to a particular position in space
// Cancels existing motion task if there is one
// expect this to take a few seconds.
message MoveGripperTo {
  oneof dest {
    // Move the gripper to a raw position
    nf.common.Vec3 pos = 1;

    // Position the gripper a safe distance over the named target
    string target_id = 2; 
  }
}

// A single kind of update that a UI, ursina or web, is providing to Observer
// Typically to control the robot
message ControlItem {
  oneof payload {
    CommonCommand command = 1;
    JogSpool jog_spool = 2;
    CombinedMove move = 3;
    GantryGoalPos gantry_goal_pos = 4;
    nf.common.EpisodeControl episode_control= 9;
    ScaleRoom scale_room = 6;
    AddTargetFromAnchorCam add_cam_target = 7;
    DeleteTarget delete_target = 8;
    Debug debug = 10;
    SetSwingCancellation set_swing_cancellation = 11;
    SingleComponentAction single_component_action = 12;
    ManageLerobotSession manage_lerobot_session = 13;
    MoveGripperTo move_gripper_to = 14;

    // next id = 15
  }
}

// the frame sent over the wire
message ControlBatchUpdate {
  string robot_id = 1;
  repeated ControlItem updates = 2;
}